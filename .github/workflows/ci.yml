name: ci

# Merge-blocking security + quality gates (master §4, workflow-cicd).
# An errored/skipped security stage counts as a failure, not a pass (fail closed).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # least privilege

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA (digest), not floating tags (std-supplychain).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (node24)
        with:
          fetch-depth: 0 # full history so the secret scan covers every commit
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: "3.12"

      - name: Install (dev + graph extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,graph]"

      - name: Lint (ruff)
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Docs link check (relative links + anchors; hermetic)
        run: python scripts/check_links.py

      - name: Type check (mypy strict)
        run: mypy src
        env:
          MYPYPATH: src

      - name: SAST (bandit)
        run: bandit -q -r src

      - name: Tests + coverage gate (>=90% line+branch)
        run: pytest

      - name: Critical-path coverage gate (100%)
        run: |
          pytest -o addopts="" \
            --cov=parcus.compress --cov=parcus.model --cov=parcus.spans \
            --cov=parcus.cache.key --cov=parcus.cache.policy --cov=parcus.redact \
            --cov=parcus.invariants --cov=parcus.eval.equivalence --cov=parcus.eval.quality \
            --cov=parcus.memory.compaction --cov=parcus.memory.provider --cov=parcus.tenant \
            --cov=parcus.quota --cov=parcus.cache.similarity --cov=parcus.cache.encryption \
            --cov-branch --cov-fail-under=100 -q

      - name: Dependency audit (SCA)
        run: pip-audit

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --of JSON -o sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (node24)
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      - name: Secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0 (node24)
        env:
          GITHUB_TOKEN: ${{ github.token }} # required by gitleaks-action to scan PRs (free on public repos)
