name: ci

# Merge-blocking security + quality gates (master §4, workflow-cicd).
# An errored/skipped security stage counts as a failure, not a pass (fail closed).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read   # least privilege

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA (digest), not floating tags (std-supplychain).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so the secret scan covers every commit
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install (dev + graph extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,graph]"

      - name: Lint (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type check (mypy strict)
        run: mypy src
        env:
          MYPYPATH: src

      - name: SAST (bandit)
        run: bandit -q -r src

      - name: Tests + coverage gate (>=90% line+branch)
        run: pytest

      - name: Critical-path coverage gate (100%)
        run: |
          pytest -o addopts="" \
            --cov=parsimony.compress --cov=parsimony.model --cov=parsimony.spans \
            --cov=parsimony.cache.key --cov=parsimony.cache.policy --cov=parsimony.redact \
            --cov=parsimony.invariants --cov=parsimony.eval.equivalence --cov=parsimony.eval.quality \
            --cov=parsimony.memory.compaction --cov=parsimony.memory.provider --cov=parsimony.tenant \
            --cov=parsimony.quota --cov=parsimony.cache.similarity --cov=parsimony.cache.encryption \
            --cov-branch --cov-fail-under=100 -q

      - name: Dependency audit (SCA)
        run: pip-audit

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --of JSON -o sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }} # required by gitleaks-action to scan PRs (free on public repos)
