name: release

# Tag-triggered release: build once, generate an SBOM, attach signed SLSA build provenance
# (Sigstore keyless via OIDC — no stored secrets), and publish a GitHub Release with the
# artifacts + SBOM (workflow-release, std-supplychain). Actions pinned by digest.
#
# NOT YET EXECUTED: GitHub Actions is billing-blocked on this account, so this workflow is
# unverified until billing is restored and a v* tag is pushed. Publishing to PyPI is intentionally
# omitted (an outward action to decide deliberately) — see the commented trusted-publishing block.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for Sigstore keyless signing
  attestations: write # store the build-provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (node24)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (node24)
        with:
          python-version: "3.12"

      - name: Build sdist + wheel (one artifact, promoted as-is)
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Generate SBOM (CycloneDX) for the released package
        run: |
          pip install "dist/"*.whl cyclonedx-bom
          cyclonedx-py environment --of JSON -o sbom.cdx.json

      - name: Attest build provenance (SLSA, Sigstore-signed)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "dist/*"

      - name: Publish GitHub Release with artifacts + SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* sbom.cdx.json --generate-notes

      # PyPI publishing via Trusted Publishing (OIDC — no stored token). Gated OFF by default so a
      # release still succeeds before the publisher is configured. To ENABLE:
      #   1. On pypi.org, add a (pending) Trusted Publisher for project `parcus`:
      #        owner=0xb007ab1e, repo=parcus, workflow=release.yml  (environment optional).
      #   2. Set repo variable PUBLISH_TO_PYPI=true (Settings → Secrets and variables → Actions).
      # Then a tagged release publishes automatically (or re-run this run to publish an existing tag).
      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist # the built wheel + sdist only (SBOM stays a GitHub Release asset)
