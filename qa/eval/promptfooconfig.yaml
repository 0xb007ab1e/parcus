# promptfoo configuration — lossy-tier differential correctness gate for parcus.
#
# WHAT IT CHECKS: parcus's lossy compression (Tier-1 aggressive filler, and later Tier-2 learned)
# must not change the model's answer. For each task we run the model on BOTH the ORIGINAL prompt
# and parcus's COMPRESSED prompt, then an LLM judge scores whether the answer still satisfies the
# ORIGINAL intent. The compressed answer must pass; the original is a sanity control.
#
# NOT run in CI by default — it needs a real model (and a key) and costs tokens. Run it
# periodically / before enabling a lossy tier in production. See README.md.
#
# RUN:
#   python qa/eval/build_dataset.py            # regenerate dataset.yaml from parcus (local, no key)
#   export ANTHROPIC_API_KEY=...               # the model + grader key (never commit it)
#   npx -y promptfoo@latest eval -c qa/eval/promptfooconfig.yaml
#   npx -y promptfoo@latest view                # browse results
#
# Swap providers for your stack (e.g. OPENAI_API_KEY + openai:chat:gpt-4o-mini) via the ids below
# or `--providers` on the CLI. Pin promptfoo to a known version in CI rather than @latest.

description: parcus lossy-tier differential eval — compressed answers must match the original

# The model under test answers each prompt variant. Default to a small, cheap Claude model;
# change this to the model your harness actually uses.
providers:
  - id: anthropic:messages:claude-3-5-haiku-latest

# Two variants per task: the verbose original and parcus's compressed form. The compressed
# output must match the original's intent; the original is the control (should trivially pass).
prompts:
  - id: original
    label: original (control)
    raw: "{{original}}"
  - id: compressed
    label: parcus-compressed
    raw: "{{compressed}}"

defaultTest:
  options:
    # The LLM judge that grades the rubric below. Same provider so only one key is needed.
    provider: anthropic:messages:claude-3-5-haiku-latest
  assert:
    - type: llm-rubric
      value: |
        The user's ORIGINAL request was:
        "{{original}}"

        The response above was produced from a (possibly compressed) paraphrase of that request.
        PASS only if the response correctly and completely satisfies the ORIGINAL request — the
        same substantive answer, with no required information missing, added, or altered. Minor
        wording or length differences are acceptable; a different, wrong, or less complete answer
        is a FAIL. Reply with the verdict and a one-sentence reason.

# Test rows are generated by build_dataset.py (original + compressed per task).
tests: file://dataset.yaml
