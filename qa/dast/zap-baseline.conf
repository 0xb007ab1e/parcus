# ZAP baseline rule tuning for parcus. Format: <ruleId>\t<ACTION>\t<comment>
# ACTION ∈ IGNORE | WARN | FAIL. Reviewed decisions only — do not blanket-ignore real findings.
#
# parcus is a transparent API proxy, not an HTML web app: it relays provider responses and emits
# only small JSON for its own endpoints (/__parcus__/*) and errors. Browser-oriented HTML
# security-header rules therefore do not apply to its responses and are downgraded to WARN/IGNORE
# with justification. Everything else stays at ZAP's default (so genuine issues still surface).

10020	IGNORE	Anti-clickjacking header — N/A: parcus serves no HTML/framed UI
10038	IGNORE	CSP header — N/A: no HTML/script responses to constrain
10063	IGNORE	Permissions-Policy header — N/A: browser-feature policy, no UI
90004	IGNORE	Strict-Transport-Security — TLS is terminated upstream/at the tailnet edge, not here
10021	WARN	X-Content-Type-Options — relayed responses keep the provider's headers; review
10096	WARN	Timestamp disclosure — review any timestamps in error/health bodies
# Information-leak and error-disclosure rules are intentionally left at DEFAULT (FAIL/WARN):
# parcus must not leak internals in its error responses (topic-error-handling, master §5).
