# Shift the CI gates left. Run `pre-commit install` (via `make setup`).
# NOTE: pin `rev:` to a tag/commit you trust; bump deliberately (supply chain).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--strict]
        files: ^src/
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-q, -r, src]
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks   # secret scan — block on detection (master §1)
